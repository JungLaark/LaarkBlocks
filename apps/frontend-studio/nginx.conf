# LaarkBlocks Studio — nginx 서빙 설정
#
# 핵심 포인트: SSE(Server-Sent Events) 프록시 설정.
# nginx 는 기본적으로 업스트림 응답을 버퍼링하는데, 그대로 두면
# 토큰 스트림이 버퍼에 고였다가 한 번에 쏟아져 '타이핑 효과'가 죽는다.
# → proxy_buffering off 가 반드시 필요하다.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 — /studio, /console 새로고침 시에도 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API 프록시 — 도커 네트워크의 서비스 이름으로 연결
    location /api/ {
        proxy_pass http://ai-engine:8000;

        # ── SSE 스트리밍 필수 설정 ──────────────────────────
        proxy_buffering off;            # 토큰을 버퍼 없이 즉시 전달
        proxy_cache off;
        proxy_http_version 1.1;         # chunked 스트림 지원
        proxy_set_header Connection ""; # keep-alive 유지
        proxy_read_timeout 300s;        # 긴 생성(로컬 sLLM) 대비

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
